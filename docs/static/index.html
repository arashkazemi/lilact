<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"/>
	<title>Lilact Demo</title>
	<script src='./lilact.development.min.js' type="module"></script>

	<script src="prismjs/prism.min.js"></script>
	<script src="prismjs/prism-jsx.min.js"></script>
	<link rel="stylesheet" href="prismjs/prism.min.css">

</head>

<body></body>

<script type='text/jsx'>
	
const { useRef, useEffect, useState, Suspense, Spinner, run, render } = Lilact;
const { css,cx,injectGlobal } = Lilact.emotion;


const cache = new Map();

function createResource(url) {
	let record = cache.get(url);
	if (!record) {
		record = {
			status: "pending",
			promise: null,
			data: null,
			error: null,
		};

		record.promise = fetch(url)
			.then(r => {
				if (!r.ok) throw new Error(`HTTP ${r.status}`);
				return r.text();
			})
			.then(data => {
				record.status = "success";
				record.data = data;
			})
			.catch(err => {
				record.status = "error";
				record.error = err;
			});

		cache.set(url, record);
	}
	return {
		read() {
			if (record.status === "pending") throw record.promise;
			if (record.status === "error") throw record.error;
			return record.data;
		}
	};
}



injectGlobal({"*:not(code):not(code *)" : {fontFamily: "Ubuntu, 'Segoe UI', 'Noto Sans', helvetica, sans", fontSize: "14px"}});


injectGlobal({ 	
		code: { 
			whiteSpace: "pre !important",
			padding: "10px 0",
			fontSize: "14px !important",
			display: "block",
			overflowWrap: "anywhere" 
		},
		p: {padding: "10px"},
		body: { padding: "20px", background: "#262d36", color: "#e7e7e7" },
		":visited": {color: "#c16480"},

	});

const outer = css({
	display: "flex",
	flexDirection: "row",
	gap: 2,
	alignItems: "stretch",
	width: "calc(100% - 8px)",
	margin: "2px 4px;",
	borderRadius: "10px",
  	overflow: "hidden"
});

const collapsible = css({
	width: "calc(100% - 8px)",
	display: "block",
	fontSize: "16px",
	padding: "10px",
    borderRadius: "10px",
    border: "none",
    margin: "4px",
	background:"#ece9ea",
	":hover": {
		background:"#ffa7c2"
	}
});

const responsiveOuter = css({
	"@media (max-width: 600px)": {
		flexDirection: "column",
	},
});

const pane = css({ flex: "1 1 0",
						height: "400px",
						minHeight: "400px",
						overflowY: "auto",
						padding: "10px",
						background:"#fff",
						color: "#222",
						button: {
							background:"#ece9ea",
							padding: "10px",
							border: "none",
							borderRadius: "7px",
							margin: "5px",

							":hover": {
								background:"#ffa7c2"
							}
						}
					});

const left = css({ float: "left" });
const right = css({ float: "right" });
const demobox = css({ background: "#fff3", borderRadius: "12px", padding: "2px", margin: "4px"});



function DemoView({ file }) 
{
	const [isOpen, setOpen] = useState(false);

	const viewRef = useRef();
	const codeRef = useRef();

	const resource = createResource("demos/"+file[0]);
	const code = resource.read(); // Suspense will handle the promise

	if(isOpen) {
		useEffect(() => {
			const Comp = run(code, "demos/"+file[0]);
			Lilact.render(<Comp/>, viewRef.current);
		});

		useEffect(() => {
			Prism.highlightElement(codeRef.current);
		});
	}
	
	return 	<>
						<button onClick={()=>setOpen(!isOpen)} className={collapsible} type="button">
							<span className={left}>{ (isOpen?'- ':'+ ') + file[0] + ' '}</span>
							<b className={right}>{file[1]}</b>
						</button>
						{isOpen &&
						<div style={{width:"100%"}}>
							<div className={cx(responsiveOuter,outer)}>
								<div className={pane} style={{background:"#f5f2f0"}}>
									<code className="language-jsx code_style" ref={codeRef}>{code}</code>
								</div>
								<div className={pane} ref={viewRef}></div>
							</div>
						</div>
						}
					</>;
}


function DemoBlock({file}) 
{
	return <div key={file[0]} className={demobox}>
							<Suspense fallback={<Spinner/>}>
								<DemoView file={file} />
							</Suspense>
					</div>
}


function App()
{
	const demos =[	
		['stopwatch.jsx',				'( useState, useRef )'],
		['pane.jsx',						'( useRef, useState, ResizablePane )'],
		['modal.jsx',						'( useEffect, useRef, useState )'],
		['actionstate.jsx',			'( useActionState, useState )'],
		['context.jsx',					'( createContext, useContext, useState ), emotion:( css, cx )'],
		['proptypes.jsx',				'( PropTypes )'],
		['router.jsx',					'( HashRouter, NavLink, Routes, Route, useNavigate, useLocation )'],
		['use-deffered.jsx',		'( useState, useDeferredValue )'],
		['css-transition.jsx',		'( CSSTransition, useState, useRef )'],
		<!-- ['switch-transition.jsx',	'( SwitchTransition, useState )'], -->
		['usetransition.jsx',		'( useTransition, useState, useCallback, useId ), emotion:( css, cx )'],
		['transition.jsx',			'( useState, Transition )'],
		['reducer.jsx',					'( useReducer )'],
		['redux.jsx',						'( Provider, useSelector, useDispatch, connect ), redux:( createStore )'],
		['suspense.jsx',				'( Suspense, Spinner )'],
		['lazy.jsx',						'( lazy, require, Suspene, Spinner )'],
		['form-elements.jsx',		'()'],
		['error-boundary.jsx',						'( ErrorBoundary, useState )'],
		['error-parser.jsx',							'-- JSX Parser Error --'],
		['error-init.jsx',								'-- Error in Component initialization --'],
		['error-component-stack.jsx',			'-- Error Component Stack --'],
		['error-callback.jsx',						'-- Error in Callback --'],
	];

	return<>
						<center>
						<img src="icon.png" width="128"/><br/>
						<h1>Lilact Demos</h1>

						<p>These scripts are transpiled and run directly in your browser. You have already loaded Lilact completely!</p>

						<p>These examples are not meant to be pretty.

							These are bare minimum examples of the React API implemented in Lilact.</p>

						<p>Note that we are using the development version here to have PropTypes warnings.
							If you switch to production mode PropTypes won't check anything.</p>

						<p>In many examples like boundary or PropTypes you should have your browser console opened to see the logs.</p>

						<p><b>Error examples other than ErrorBoundary demo will cause the page to stop working, as there is no
						boundary in place.<br/>It is natural of course, and you should refresh the page to continue testing.</b></p>
						
						<p>See the{" "}<a href="../">Lilact Documentation</a>{" "}for more info.</p>
						</center>
						{demos.map((x)=><DemoBlock file={x}/>)}

						<hr/>
						<p>
							Copyright (C) 2024-2026 Arash Kazemi {" <contact.arash.kazemi@gmail.com>"}. All rights reserved.
							<br/><br/>
							Lilact project is subject to the terms of BSD-2-Clause License. See the `LICENSE.TXT` file for more details.
						</p>
					</>
}

render(<App/>, document.body);

</script>

</html>
